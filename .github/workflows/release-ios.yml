name: Release iOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (optional)"
        required: false

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ vars.XCODE_VERSION }}
        run: sudo xcode-select -switch /Applications/Xcode_${{ vars.XCODE_VERSION }}.app

      - name: Write App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/private_keys"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>${{ vars.EXPORT_METHOD }}</string>
            <key>teamID</key><string>${{ vars.TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          PLIST

      - name: Archive (automatic signing via ASC key)
        run: |
          set -euo pipefail
          xcodebuild -scheme "${{ vars.SCHEME }}" \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ vars.TEAM_ID }}" \
            clean archive

      - name: Export .ipa
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail
          IPA="$(ls "$RUNNER_TEMP/export/"*.ipa | head -n 1)"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"